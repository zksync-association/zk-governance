name: L2 contracts ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

env:
  FOUNDRY_PROFILE: ci

jobs:
  build:
    defaults:
      run:
        working-directory: ./l2-contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          fetch-depth: 1

      - name: Install zksync-foundry
        uses: ./.github/actions/install-zksync-foundry

      - name: Install dependencies
        run: forge install && npm install

      - name: Build
        run: npm run compile

  test:
    defaults:
      run:
        working-directory: ./l2-contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          fetch-depth: 1

      - name: Install zksync-foundry
        uses: ./.github/actions/install-zksync-foundry

      - name: Install dependencies
        run: forge install && npm install

      - name: Build
        run: npm run compile

      - name: Run forge tests
        run: npm run foundry-test

      - name: Run Era test node
        uses: dutterbutter/era-test-node-action@v0.1.3

      - name: Run hardhat tests
        run: npx hardhat test

  lint:
    defaults:
      run:
        shell: bash
        working-directory: ./l2-contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          fetch-depth: 1

      - name: Install zksync-foundry
        uses: ./.github/actions/install-zksync-foundry

      - name: Install dependencies
        run: forge install

      - name: Install scopelint
        uses: engineerd/configurator@v0.0.8
        with:
          name: scopelint
          repo: ScopeLift/scopelint
          fromGitHubReleases: true
          version: latest
          pathInArchive: scopelint-x86_64-linux/scopelint
          urlTemplate: https://github.com/ScopeLift/scopelint/releases/download/{{version}}/scopelint-x86_64-linux.tar.xz
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check formatting
        run: |
          scopelint --version
          scopelint check

  hashes:
    # Rebuild both projects from source, recompute every contract's
    # bytecode hash, and fail the build if AllContractsHashes.json doesn't
    # match. Mirrors era-contracts' `calculate-hashes:check` so reviewers
    # can spot any unexpected bytecode drift across PRs without doing a
    # fresh build locally.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          fetch-depth: 1

      - name: Install zksync-foundry
        uses: ./.github/actions/install-zksync-foundry

      - name: Install l1-contracts deps + build (EVM)
        working-directory: ./l1-contracts
        run: forge install && forge build

      - name: Install l2-contracts deps + build (EVM + zkSync)
        working-directory: ./l2-contracts
        run: forge install && npm install && npm run compile

      - name: Install root deps
        run: yarn install --frozen-lockfile

      - name: Check AllContractsHashes.json is up to date
        run: yarn calculate-hashes:check
