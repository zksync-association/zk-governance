name: L1 contracts CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

env:
  FOUNDRY_PROFILE: ci

jobs:
  build:
    defaults:
      run:
        working-directory: ./l1-contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: dutterbutter/foundry-zksync-toolchain@v1

      - name: Install dependencies
        run: forge install && npm install

      - name: Build
        run: npm run compile

  lint:
    defaults:
      run:
        working-directory: ./l1-contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1.5.0

      - name: Install dependencies
        run: forge install

      - name: Linting checks
        run: forge lint

      - name: Formatting checks
        run: forge fmt --check      

  test:
    needs: [build, lint]    
    defaults:
      run:
        working-directory: ./l1-contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: dutterbutter/foundry-zksync-toolchain@v1

      - name: Install dependencies
        run: forge install && npm install

      - name: Build
        run: npm run compile

      - name: Run forge tests
        run: npm run foundry-test

      - name: Run Era test node
        uses: dutterbutter/era-test-node-action@v0.1.3

      - name: Run hardhat tests
        run: npx hardhat test


