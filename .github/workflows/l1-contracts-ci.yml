name: L1 contracts CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

env:
  FOUNDRY_PROFILE: ci

jobs:
  build:
    defaults:
      run:
        working-directory: ./l1-contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: dutterbutter/foundry-zksync-toolchain@v1

      - name: Install dependencies
        run: forge install

      - name: Build
        run: forge build

  lint:
    defaults:
      run:
        working-directory: ./l1-contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1.5.0

      - name: Install dependencies
        run: forge install

      - name: Linting checks
        run: forge lint

      - name: Formatting checks
        run: forge fmt --check      

  test:
    needs: [build, lint]    
    defaults:
      run:
        working-directory: ./l1-contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: dutterbutter/foundry-zksync-toolchain@v1

      - name: Install dependencies
        run: forge install

      - name: Build
        run: forge build

      - name: Run forge tests
        run: forge test

  coverage:
    needs: [test]  
    runs-on: ubuntu-latest  
    defaults:
      run:
        working-directory: ./l1-contracts
    permissions:
        contents: read
        pull-requests: write
    steps:
        - name: Checkout the repository
          uses: actions/checkout@v4

        - name: Install Foundry
          uses: foundry-rs/foundry-toolchain@v1.5.0

        - name: Install dependencies
          run: forge install

        - name: Generate coverage
          run: forge coverage --no-match-coverage 'script|test' --report lcov

        - uses: kefasjw/lcov-pull-request-report@v1
          with:
            lcov-file: l1-contracts/lcov.info
            all-files-minimum-coverage: 83
            github-token: ${{ secrets.GITHUB_TOKEN }}