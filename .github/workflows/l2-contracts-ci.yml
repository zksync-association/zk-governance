name: L2 contracts CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

env:
  FOUNDRY_PROFILE: ci

jobs:
  build:
    defaults:
      run:
        working-directory: ./l2-contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: dutterbutter/foundry-zksync-toolchain@v1

      - name: Install dependencies
        run: |
          forge install
          npm install

      - name: Build
        run: npm run compile

  lint:
    defaults:
      run:
        working-directory: ./l2-contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1.5.0

      - name: Install dependencies
        run: forge install

      - name: Linting checks
        run: forge lint

      - name: Formatting checks
        run: forge fmt --check

  foundry-test:
    needs: [build, lint]
    defaults:
      run:
        working-directory: ./l2-contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: dutterbutter/foundry-zksync-toolchain@v1

      - name: Install dependencies
        run: |
          forge install
          npm install

      - name: Build
        run: npm run compile

      - name: Run forge tests
        run: npm run foundry-test

  hardhat-test:
    needs: [build, lint]    
    defaults:
      run:
        working-directory: ./l2-contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: dutterbutter/foundry-zksync-toolchain@v1

      - name: Install dependencies
        run: |
          forge install
          npm install

      - name: Build
        run: npm run compile

      - name: Run Era test node
        uses: dutterbutter/era-test-node-action@v0.1.3

      - name: Run hardhat tests
        run: npx hardhat test
        
  coverage: # TODO aggregate coverage info of hardhat tests
    needs: [foundry-test]  # [foundry-test, hardhat-test]
    runs-on: ubuntu-latest  
    defaults:
      run:
        working-directory: ./l2-contracts
    permissions:
        contents: read
        pull-requests: write
    steps:
        - name: Checkout the repository
          uses: actions/checkout@v4

        - name: Install Foundry
          uses: foundry-rs/foundry-toolchain@v1.5.0

        - name: Install dependencies
          run: forge install

        - name: Generate coverage
          run: forge coverage --no-match-coverage 'script|test' --report lcov

        - uses: kefasjw/lcov-pull-request-report@v1
          with: 
            lcov-file: l2-contracts/lcov.info
            #all-files-minimum-coverage: 83
            comment-title: "L2 contracts"
            github-token: ${{ secrets.GITHUB_TOKEN }}